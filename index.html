<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
    h1 { margin: 20px 0; }
    .game-board { display: grid; grid-template-columns: repeat(4, 100px); grid-gap: 15px; justify-content: center; margin-top: 20px; }
    .card { width: 100px; height: 100px; perspective: 1000px; cursor: pointer; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 8px; }
    .card-front { background: #fff; border: 2px solid #ccc; }
    .card-back { background: #333; color: #fff; transform: rotateY(180deg); }
  </style>
</head>
<body>
  <h1>Memory Game</h1>
  <button id="restart">Restart Game</button>
  <div class="game-board" id="gameBoard"></div>

  <script>
    const gameBoard = document.getElementById("gameBoard");
    const restartBtn = document.getElementById("restart");

    const emojis = ["🍎","🍌","🍇","🍓","🍒","🍍","🥝","🍉"];
    let cards = [...emojis, ...emojis];
    let flippedCards = [];
    let matchedCount = 0;

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function createBoard() {
      gameBoard.innerHTML = "";
      matchedCount = 0;
      flippedCards = [];
      shuffle(cards).forEach(emoji => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.value = emoji;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">${emoji}</div>
            <div class="card-back">?</div>
          </div>
        `;
        card.addEventListener("click", () => flipCard(card));
        gameBoard.appendChild(card);
      });
    }

    function flipCard(card) {
      if (flippedCards.length < 2 && !card.classList.contains("flipped")) {
        card.classList.add("flipped");
        flippedCards.push(card);
        if (flippedCards.length === 2) checkMatch();
      }
    }

    function checkMatch() {
      const [card1, card2] = flippedCards;
      if (card1.dataset.value === card2.dataset.value) {
        matchedCount += 2;
        flippedCards = [];
        if (matchedCount === cards.length) setTimeout(() => alert("🎉 You Win!"), 500);
      } else {
        setTimeout(() => {
          card1.classList.remove("flipped");
          card2.classList.remove("flipped");
          flippedCards = [];
        }, 1000);
      }
    }

    restartBtn.addEventListener("click", createBoard);
    createBoard();
  </script>
</body>
</html>
