<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game - Multi Level</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
    h1 { margin: 20px 0; }
    .stats { margin: 10px 0; font-size: 1.2rem; }
    .controls { margin: 15px 0; }
    .game-board { display: grid; grid-gap: 15px; justify-content: center; margin-top: 20px; }
    .card { width: 100px; height: 100px; perspective: 1000px; cursor: pointer; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 8px; }
    .card-front { background: #fff; border: 2px solid #ccc; }
    .card-back { background: #333; color: #fff; transform: rotateY(180deg); }
    .win-message { margin-top: 20px; font-size: 1.5rem; color: green; }
  </style>
</head>
<body>
  <h1>Memory Game</h1>
  <div class="stats">
    Moves: <span id="moves">0</span> | Time: <span id="time">0</span>s
  </div>
  <div class="controls">
    <label for="level">Choose Level: </label>
    <select id="level">
      <option value="easy">Easy (2x2)</option>
      <option value="medium" selected>Medium (4x4)</option>
      <option value="hard">Hard (6x6)</option>
    </select>
    <button id="restart">Restart Game</button>
  </div>
  <div class="game-board" id="gameBoard"></div>
  <div class="win-message" id="winMessage"></div>

  <script>
    const gameBoard = document.getElementById("gameBoard");
    const restartBtn = document.getElementById("restart");
    const movesDisplay = document.getElementById("moves");
    const timeDisplay = document.getElementById("time");
    const winMessage = document.getElementById("winMessage");
    const levelSelect = document.getElementById("level");

    const emojis = ["🍎","🍌","🍇","🍓","🍒","🍍","🥝","🍉","🍋","🥥","🍑","🍐","🥭","🍈","🍏","🍔","🍕","🍟"];
    let cards = [];
    let flippedCards = [];
    let matchedCount = 0;
    let moves = 0;
    let timer;
    let seconds = 0;

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function startTimer() {
      clearInterval(timer);
      seconds = 0;
      timeDisplay.textContent = seconds;
      timer = setInterval(() => {
        seconds++;
        timeDisplay.textContent = seconds;
      }, 1000);
    }

    function createBoard() {
      gameBoard.innerHTML = "";
      winMessage.textContent = "";
      matchedCount = 0;
      flippedCards = [];
      moves = 0;
      movesDisplay.textContent = moves;

      let level = levelSelect.value;
      let gridSize, pairsNeeded;

      if (level === "easy") {
        gridSize = 2; pairsNeeded = 2;
      } else if (level === "medium") {
        gridSize = 4; pairsNeeded = 8;
      } else {
        gridSize = 6; pairsNeeded = 18;
      }

      gameBoard.style.gridTemplateColumns = `repeat(${gridSize}, 100px)`;
      cards = shuffle([...emojis.slice(0, pairsNeeded), ...emojis.slice(0, pairsNeeded)]);

      cards.forEach(emoji => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.value = emoji;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">${emoji}</div>
            <div class="card-back">?</div>
          </div>
        `;
        card.addEventListener("click", () => flipCard(card));
        gameBoard.appendChild(card);
      });

      startTimer();
    }

    function flipCard(card) {
      if (flippedCards.length < 2 && !card.classList.contains("flipped")) {
        card.classList.add("flipped");
        flippedCards.push(card);
        if (flippedCards.length === 2) {
          moves++;
          movesDisplay.textContent = moves;
          checkMatch();
        }
      }
    }

    function checkMatch() {
      const [card1, card2] = flippedCards;
      if (card1.dataset.value === card2.dataset.value) {
        matchedCount += 2;
        flippedCards = [];
        if (matchedCount === cards.length) {
          clearInterval(timer);
          winMessage.textContent = `🎉 You Win! Completed in ${moves} moves and ${seconds} seconds.`;
        }
      } else {
        setTimeout(() => {
          card1.classList.remove("flipped");
          card2.classList.remove("flipped");
          flippedCards = [];
        }, 1000);
      }
    }

    restartBtn.addEventListener("click", createBoard);
    levelSelect.addEventListener("change", createBoard);

    createBoard();
  </script>
</body>
</html>
